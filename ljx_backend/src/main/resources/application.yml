server:
  port: 8081

spring:
  application:
    name: ljx-platform
  servlet:
    multipart:
      # 单文件最大 5MB (与 UploadController.MAX_FILE_SIZE 一致)
      max-file-size: 5MB
      # 整个请求最大 50MB (允许 10 张图)
      max-request-size: 50MB
      # 内存中超过此大小会写临时文件
      file-size-threshold: 2MB
  # 6/26 修复: 移除原 static-path-pattern: /** 配置
  #   (该配置会拦截所有路径, 包括 /api/*, 导致 500)
  #   改由 WebMvcConfig 显式 addResourceHandler("/uploads/**")
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/ljx_platform?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 12345
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.sunmao.ljx.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    default-executor-type: simple
    default-statement-timeout: 25000
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: sunmao-platform-secret-key-2024
  expiration: 86400000

deepseek:
  api:
    key: "your-deepseek-api-key"
    url: "https://api.deepseek.com/v1/chat/completions"
  model: "deepseek-chat"

logging:
  level:
    com.sunmao.ljx.mapper: debug

# 6/26 新增: 文件上传根目录 (绝对路径)
# 修复问题: Spring Boot 运行工作目录可能在 Temp 下, 相对路径 uploads 会失败
# 这里固定到 user.dir 下的 uploads 目录, 跨平台都安全
ljx:
  upload:
    # 留空时 fallback 到 user.dir + /uploads
    dir: ${user.dir}/uploads
